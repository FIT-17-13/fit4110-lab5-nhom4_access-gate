version: "3.8"

services:
  # Dịch vụ API Access Gate (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Dịch vụ Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-access_gate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-access_gate_pass}
      POSTGRES_DB: ${POSTGRES_DB:-access_gate_db}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-access_gate_user} -d ${POSTGRES_DB:-access_gate_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dịch vụ AI Service mock (chạy trên cùng Dockerfile để có sẵn fastapi/uvicorn)
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-ai-lab05
    volumes:
      - ./src/ai_service:/app/src/ai_service
    command: ["uvicorn", "ai_service.main:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data: